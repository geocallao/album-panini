<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Álbum Panini FIFA 2026 - Control de Figuritas</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            margin: 0;
            padding: 10px;
            color: #333;
            min-height: 100vh;
        }
        .container {
            max-width: 100%;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            padding: 15px;
        }
        h1 { text-align: center; color: #ffd700; text-shadow: 2px 2px 0 #2a5298; margin: 0 0 10px 0; font-size: 1.4rem; }
        .toolbar { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 10px 0; padding: 8px; background: #f0f2f5; border-radius: 50px; }
        button { background: #2a5298; color: white; border: none; padding: 8px 16px; border-radius: 40px; font-size: 0.8rem; font-weight: bold; cursor: pointer; transition: all 0.3s ease; touch-action: manipulation; }
        button:active { transform: scale(0.97); }
        button.report-btn { background: #ff9800; color: #1e3c72; }
        button.export-json-btn { background: #4caf50; }
        button.export-txt-btn { background: #2196f3; }
        button.import-btn { background: #9c27b0; }
        .stats { text-align: center; padding: 8px; font-weight: bold; background: #e8f0fe; border-radius: 20px; margin: 8px 0; font-size: 12px; }
        .table-container { width: 100%; overflow-x: auto; overflow-y: auto; -webkit-overflow-scrolling: touch; border: 1px solid #ddd; border-radius: 10px; background: white; max-height: 60vh; }
        table { border-collapse: collapse; font-size: 11px; min-width: 900px; width: 100%; }
        th { background: #ffd700; color: #1e3c72; padding: 8px 5px; position: sticky; top: 0; z-index: 10; border: 1px solid #ccc; font-weight: bold; }
        td { border: 1px solid #ddd; text-align: center; padding: 6px 4px; background-color: white; }
        th:first-child, td:first-child { position: sticky; left: 0; background-color: #fff3cd; z-index: 5; font-weight: bold; text-align: left; min-width: 110px; }
        th:first-child { background-color: #ffd700; z-index: 15; }
        .sticker-cell { cursor: pointer; font-size: 1.1rem; font-weight: bold; touch-action: manipulation; min-width: 38px; }
        .sticker-cell:active { background-color: #ccc; }
        .empty { background-color: #fafafa; }
        .have { background-color: #c8e6c9; }
        .duplicate { background-color: #ffecb3; }
        .legend { display: flex; justify-content: center; gap: 20px; margin-top: 15px; flex-wrap: wrap; font-size: 11px; }
        .legend span { display: inline-block; width: 25px; height: 25px; border-radius: 8px; margin-right: 5px; vertical-align: middle; }
        .footer { text-align: center; font-size: 10px; margin-top: 12px; color: #666; }
        .warning-note { background: #fff3cd; border-left: 4px solid #ffc107; padding: 6px 10px; margin: 8px 0; border-radius: 8px; font-size: 11px; color: #856404; }
        .status { text-align: center; padding: 6px; font-weight: bold; background: #e8f0fe; border-radius: 20px; margin: 8px 0; font-size: 11px; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); overflow: auto; }
        .modal-content { background-color: white; margin: 5% auto; padding: 20px; border-radius: 20px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; position: relative; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ffd700; padding-bottom: 10px; margin-bottom: 15px; }
        .modal-header h3 { margin: 0; color: #1e3c72; font-size: 1.1rem; }
        .close-modal { background: #ff4444; color: white; border: none; border-radius: 50%; width: 30px; height: 30px; font-size: 18px; cursor: pointer; }
        .report-content { font-family: 'Courier New', monospace; font-size: 11px; white-space: pre-wrap; background: #f5f5f5; padding: 15px; border-radius: 10px; margin: 15px 0; max-height: 400px; overflow-y: auto; }
        .modal-buttons { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
        .modal-buttons button { flex: 1; font-size: 12px; padding: 8px; }
        @media (max-width: 700px) {
            body { padding: 5px; }
            .container { padding: 10px; }
            button { padding: 6px 12px; font-size: 0.7rem; }
            td, th { padding: 4px 2px; font-size: 10px; }
            th:first-child, td:first-child { min-width: 90px; }
            .sticker-cell { font-size: 0.9rem; min-width: 30px; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>⚽ Álbum Panini FIFA 2026 📸</h1>
    
    <div class="toolbar">
        <button id="reportBtn" class="report-btn">📊 Reporte</button>
        <button id="exportTxtBtn" class="export-txt-btn">📄 Exportar TXT</button>
        <button id="exportJsonBtn" class="export-json-btn">💾 Exportar JSON</button>
        <input type="file" id="importFile" accept=".json" style="display:none" />
        <button id="importDataBtn" class="import-btn">📂 Importar</button>
    </div>
    
    <div class="stats" id="globalStats">Cargando...</div>
    <div class="warning-note">📊 48 países | 20 figuritas c/u | 960 total</div>
    <div class="status" id="statusMsg">💡 Toca casilla: Vacío → ✅ Tengo → 🔁 Repetida</div>
    
    <div class="table-container" id="tableContainer">
        <div id="albumTableContainer"></div>
    </div>
    
    <div class="legend">
        <div><span style="background:#fafafa; border:1px solid #ccc;"></span> Vacío (◻️)</div>
        <div><span style="background:#c8e6c9;"></span> ✅ Tengo</div>
        <div><span style="background:#ffecb3;"></span> 🔁 Repetida</div>
    </div>
    <div class="footer">↕️ Scroll vertical | ↔️ Scroll horizontal | 🇦🇱 48 países</div>
</div>

<div id="reportModal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><h3>📋 Figuritas Repetidas</h3><button class="close-modal" id="closeModalBtn">✕</button></div>
        <div id="reportText" class="report-content">Cargando...</div>
        <div class="modal-buttons">
            <button id="copyReportBtn" class="copy-btn" style="background:#4caf50;">📋 Copiar</button>
            <button id="exportImageBtn" class="image-btn" style="background:#ff9800;">🖼️ Imagen</button>
        </div>
    </div>
</div>

<script>
    const paisesDataRaw = [
        { nombre: "MEXICO", grupo: "A" }, { nombre: "SUDAFRICA", grupo: "A" }, { nombre: "KOREA", grupo: "A" }, { nombre: "REP. CHECA", grupo: "A" },
        { nombre: "CANADA", grupo: "B" }, { nombre: "BOSNIA HERZEGOVINA", grupo: "B" }, { nombre: "QATAR", grupo: "B" }, { nombre: "SUIZA", grupo: "B" },
        { nombre: "BRASIL", grupo: "C" }, { nombre: "MARRUECOS", grupo: "C" }, { nombre: "HAITI", grupo: "C" }, { nombre: "ESCOCIA", grupo: "C" },
        { nombre: "USA", grupo: "D" }, { nombre: "PARAGUAY", grupo: "D" }, { nombre: "AUSTRALIA", grupo: "D" }, { nombre: "TURQUIA", grupo: "D" },
        { nombre: "GERMANY", grupo: "E" }, { nombre: "CURACAO", grupo: "E" }, { nombre: "COSTA DE MARFIL", grupo: "E" }, { nombre: "ECUADOR", grupo: "E" },
        { nombre: "NETHERLANDS", grupo: "F" }, { nombre: "JAPON", grupo: "F" }, { nombre: "SUECIA", grupo: "F" }, { nombre: "TUNEZ", grupo: "F" },
        { nombre: "BELGICA", grupo: "G" }, { nombre: "EGIPTO", grupo: "G" }, { nombre: "IRAN", grupo: "G" }, { nombre: "NUEVA ZELANDA", grupo: "G" },
        { nombre: "SPAIN", grupo: "H" }, { nombre: "CABO VERDE", grupo: "H" }, { nombre: "ARABIA SAUDI", grupo: "H" }, { nombre: "URUGUAY", grupo: "H" },
        { nombre: "FRANCIA", grupo: "I" }, { nombre: "SENEGAL", grupo: "I" }, { nombre: "IRAQ", grupo: "I" }, { nombre: "NORUEGA", grupo: "I" },
        { nombre: "ARGENTINA", grupo: "J" }, { nombre: "ALGERIA", grupo: "J" }, { nombre: "AUSTRIA", grupo: "J" }, { nombre: "JORDANIA", grupo: "J" },
        { nombre: "PORTUGAL", grupo: "K" }, { nombre: "CONGO", grupo: "K" }, { nombre: "UZBEKISTAN", grupo: "K" }, { nombre: "COLOMBIA", grupo: "K" },
        { nombre: "ENGLAND", grupo: "L" }, { nombre: "CROACIA", grupo: "L" }, { nombre: "GHANA", grupo: "L" }, { nombre: "PANAMA", grupo: "L" }
    ];

    let stickersState = {};

    function initEmptyStates() {
        for (let pais of paisesDataRaw) stickersState[pais.nombre] = Array(20).fill(0);
    }

    function loadFromLocalStorage() {
        const saved = localStorage.getItem("panini2026_data_v4");
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                let valid = true;
                for (let pais of paisesDataRaw) {
                    if (!parsed[pais.nombre] || !Array.isArray(parsed[pais.nombre]) || parsed[pais.nombre].length !== 20) valid = false;
                }
                if (valid) stickersState = parsed;
                else initEmptyStates();
            } catch(e) { initEmptyStates(); }
        } else { initEmptyStates(); }
        updateGlobalStats();
    }

    function saveToLocalStorage() {
        localStorage.setItem("panini2026_data_v4", JSON.stringify(stickersState));
        updateGlobalStats();
    }
    
    function updateGlobalStats() {
        let totalTenidas = 0, totalRepetidas = 0;
        for (let pais of paisesDataRaw) {
            const stickers = stickersState[pais.nombre];
            totalTenidas += stickers.filter(v => v === 1).length;
            totalRepetidas += stickers.filter(v => v === 2).length;
        }
        const totalFaltantes = 960 - totalTenidas - totalRepetidas;
        document.getElementById("globalStats").innerHTML = `📊 ✅ ${totalTenidas} tengo | 🔁 ${totalRepetidas} repetidas | ⬜ ${totalFaltantes} faltan | 🎯 960 total`;
    }

    function renderAlbum() {
        const container = document.getElementById("albumTableContainer");
        if (!container) return;
        let html = '<table><thead><tr><th>País / Grupo</th>';
        for (let i = 1; i <= 20; i++) html += `<th>${i}</th>`;
        html += '</tr></thead><tbody>';
        for (let pais of paisesDataRaw) {
            html += `<tr><td style="font-weight:bold; white-space:nowrap;">${pais.nombre} (${pais.grupo})</td>`;
            const stickers = stickersState[pais.nombre];
            for (let num = 0; num < 20; num++) {
                const estado = stickers[num];
                let clase = "empty", simbolo = "◻️";
                if (estado === 1) { clase = "have"; simbolo = "✅"; }
                else if (estado === 2) { clase = "duplicate"; simbolo = "🔁"; }
                html += `<td class="sticker-cell ${clase}" data-pais="${pais.nombre}" data-numero="${num+1}">${simbolo}</td>`;
            }
            html += '</tr>';
        }
        html += '</tbody></table>';
        container.innerHTML = html;
        attachCellEvents();
    }
    
    function nextState(s) { return s === 0 ? 1 : (s === 1 ? 2 : 0); }
    
    function attachCellEvents() {
        document.querySelectorAll('.sticker-cell').forEach(cell => {
            cell.removeEventListener('click', cellClickHandler);
            cell.addEventListener('click', cellClickHandler);
        });
    }
    
    function cellClickHandler(e) {
        const cell = e.currentTarget;
        const pais = cell.getAttribute('data-pais');
        const numero = parseInt(cell.getAttribute('data-numero'));
        if (!pais) return;
        const newEstado = nextState(stickersState[pais][numero-1]);
        stickersState[pais][numero-1] = newEstado;
        let simbolo = "", clase = "";
        if (newEstado === 1) { simbolo = "✅"; clase = "have"; }
        else if (newEstado === 2) { simbolo = "🔁"; clase = "duplicate"; }
        else { simbolo = "◻️"; clase = "empty"; }
        cell.textContent = simbolo;
        cell.className = `sticker-cell ${clase}`;
        saveToLocalStorage();
        const msg = document.getElementById("statusMsg");
        if (msg) {
            const textos = {0: "Vacío", 1: "Tengo", 2: "Repetida"};
            msg.textContent = `${textos[newEstado]} - ${pais} N°${numero}`;
            setTimeout(() => { msg.textContent = "💡 Toca casilla: Vacío → ✅ Tengo → 🔁 Repetida"; }, 1500);
        }
    }

    // ========== IMPORTACIÓN CORREGIDA (para tu archivo JSON) ==========
    function importData(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = JSON.parse(e.target.result);
                const newState = {};
                
                // Recorrer todos los países
                for (let pais of paisesDataRaw) {
                    let stickersArray = Array(20).fill(0);
                    
                    // Formato que me enviaste: data.datos[pais.nombre].figuritas
                    if (data.datos && data.datos[pais.nombre] && data.datos[pais.nombre].figuritas) {
                        const figuritas = data.datos[pais.nombre].figuritas;
                        for (let i = 1; i <= 20; i++) {
                            const key = `Nro.${i}`;
                            if (figuritas[key] && typeof figuritas[key].codigo === 'number') {
                                stickersArray[i-1] = figuritas[key].codigo;
                            }
                        }
                    }
                    // Formato alternativo: data[pais.nombre] directo
                    else if (data[pais.nombre] && Array.isArray(data[pais.nombre]) && data[pais.nombre].length === 20) {
                        stickersArray = data[pais.nombre];
                    }
                    // Formato: data.datos[pais.nombre].stickers
                    else if (data.datos && data.datos[pais.nombre] && data.datos[pais.nombre].stickers) {
                        stickersArray = data.datos[pais.nombre].stickers;
                    }
                    
                    newState[pais.nombre] = stickersArray;
                }
                
                stickersState = newState;
                saveToLocalStorage();
                renderAlbum();
                alert("✅ Datos importados correctamente desde: " + file.name);
                document.getElementById("statusMsg").textContent = "📥 Importación exitosa!";
                setTimeout(() => {
                    document.getElementById("statusMsg").textContent = "💡 Toca casilla: Vacío → ✅ Tengo → 🔁 Repetida";
                }, 2000);
            } catch(err) {
                console.error(err);
                alert("❌ Error al leer el archivo JSON. Asegúrate de que sea un archivo válido exportado desde esta aplicación.");
            }
        };
        reader.readAsText(file);
    }

    function exportToJson() {
        const exportData = {};
        for (let pais of paisesDataRaw) {
            exportData[pais.nombre] = stickersState[pais.nombre];
        }
        const blob = new Blob([JSON.stringify(exportData, null, 2)], {type:"application/json"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `panini2026_respaldo_${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(a.href);
        alert("✅ JSON exportado");
    }

    function exportToTxt() {
        let txt = "ÁLBUM PANINI FIFA 2026\n" + new Date().toLocaleString() + "\n\n";
        for (let pais of paisesDataRaw) {
            const s = stickersState[pais.nombre];
            txt += `${pais.nombre} (${pais.grupo})\n`;
            let nums = "", est = "";
            for (let i=0;i<20;i++) {
                nums += (i+1).toString().padStart(2)+" ";
                est += (s[i]===1?" T ":(s[i]===2?" R ":" . "));
                if ((i+1)%10===0 && i<19) { nums += "\n    "; est += "\n    "; }
            }
            txt += `   ${nums}\n   ${est}\n\n`;
        }
        const blob = new Blob([txt], {type:"text/plain"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `panini2026_${Date.now()}.txt`;
        a.click();
        URL.revokeObjectURL(a.href);
        alert("✅ TXT exportado");
    }

    function generateReportContent() {
        let report = "=".repeat(40) + "\n📋 REPORTE DE FIGURITAS REPETIDAS\n📅 " + new Date().toLocaleString() + "\n" + "=".repeat(40) + "\n\n";
        let totalRepe = 0, lista = [];
        for (let pais of paisesDataRaw) {
            const reps = [];
            for (let i = 0; i < 20; i++) if (stickersState[pais.nombre][i] === 2) reps.push(i+1);
            if (reps.length) {
                totalRepe += reps.length;
                lista.push(`🏷️ ${pais.nombre} (${pais.grupo})\n   🔁 ${reps.length} repe(s) - N°: ${reps.join(", ")}`);
            }
        }
        if (lista.length === 0) report += "✨ ¡FELICITACIONES! No tienes repetidas ✨\n";
        else report += lista.join("\n\n");
        let totalTenidas = 0;
        for (let pais of paisesDataRaw) totalTenidas += stickersState[pais.nombre].filter(v => v === 1).length;
        report += `\n\n${"=".repeat(40)}\n📊 Total repetidas: ${totalRepe}\n✅ Progreso: ${totalTenidas}/960 (${Math.round(totalTenidas/960*100)}%)\n`;
        return report;
    }

    function showReportModal() {
        document.getElementById("reportText").textContent = generateReportContent();
        document.getElementById("reportModal").style.display = "block";
    }
    
    async function exportReportAsImage() {
        const div = document.getElementById("reportText");
        const temp = document.createElement('div');
        temp.style.cssText = 'background:white; padding:20px; font-family:monospace; font-size:12px; white-space:pre-wrap; max-width:600px;';
        temp.textContent = div.textContent;
        document.body.appendChild(temp);
        try {
            const canvas = await html2canvas(temp, { scale: 2, backgroundColor: '#fff' });
            const link = document.createElement('a');
            link.download = `repetidas_${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
            alert("✅ Imagen guardada");
        } catch(e) { alert("Error al generar imagen"); }
        finally { document.body.removeChild(temp); }
    }

    function copyReport() {
        navigator.clipboard.writeText(document.getElementById("reportText").textContent).then(() => alert("✅ Reporte copiado"));
    }

    document.addEventListener("DOMContentLoaded", () => {
        loadFromLocalStorage();
        renderAlbum();
        
        document.getElementById("reportBtn").onclick = showReportModal;
        document.getElementById("exportTxtBtn").onclick = exportToTxt;
        document.getElementById("exportJsonBtn").onclick = exportToJson;
        document.getElementById("importDataBtn").onclick = () => document.getElementById("importFile").click();
        document.getElementById("importFile").onchange = e => { if(e.target.files[0]) importData(e.target.files[0]); e.target.value = ''; };
        
        const modal = document.getElementById("reportModal");
        document.getElementById("closeModalBtn").onclick = () => modal.style.display = "none";
        window.onclick = e => { if(e.target === modal) modal.style.display = "none"; };
        document.getElementById("copyReportBtn").onclick = copyReport;
        document.getElementById("exportImageBtn").onclick = exportReportAsImage;
    });
</script>
</body>
</html>
